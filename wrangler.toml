{
  "$schema": "node_modules/wrangler/config-schema.json",
  "name": "sandbox-website-template",
  "compatibility_date": "2025-10-08",
  "compatibility_flags": ["nodejs_compat"],
  "main": "./src/worker.ts",
  "observability": { "enabled": true },
  "upload_source_maps": true,
  "assets": {
    "directory": "./dist/sandbox_website_template",
    "not_found_handling": "single-page-application",
    "run_worker_first": ["/api/*"]
  },
  "triggers": {
    "crons": ["0 * * * *", "0 4 * * *", "0 5 * * *", "0 6 * * *"]
  },
  "d1_databases": [
    {
      "binding": "DB",
      "database_name": "sandbox-website-template",
      "database_id": "e49f965d-a9a7-4c0d-83e5-1172b032e298",
      "migrations_dir": "src/api/migrations"
    }
  ],
  "r2_buckets": [
    {
      "bucket_name": "sandbox-website-template",
      "binding": "BUCKET"
    }
  ],
  "kv_namespaces": [
    {
      "binding": "RATE_LIMIT_KV",
      "id": "local-rate-limit-kv-dev"
    }
  ],
  "queues": {
    "producers": [
      {
        "binding": "NOTIFICATIONS_QUEUE",
        "queue": "podoadmin-notifications"
      }
    ],
    "consumers": [
      {
        "queue": "podoadmin-notifications",
        "max_batch_size": 10,
        "max_batch_timeout": 5,
        "max_retries": 3
      }
    ]
  },
  "env": {
    "production": {
      "name": "podoadmin-pendiente",
      "vars": {
        "NODE_ENV": "production",
        "APP_BASE_URL": "https://podoadmin-pendiente.workers.dev",
        "ALLOWED_ORIGINS": "https://podoadmin-pendiente.workers.dev",
        "OFFICIAL_APP_DOMAIN": "https://podoadmin-pendiente.workers.dev",
        "RATE_LIMIT_ANON_READ_PER_MIN": "180",
        "RATE_LIMIT_ANON_WRITE_PER_MIN": "90",
        "RATE_LIMIT_AUTH_READ_PER_MIN": "600",
        "RATE_LIMIT_AUTH_WRITE_PER_MIN": "300",
        "RATE_LIMIT_BURST_PER_10S": "80",
        "RATE_LIMIT_TENANT_READ_PER_MIN": "2000",
        "RATE_LIMIT_TENANT_WRITE_PER_MIN": "800"
      },
      "d1_databases": [
        {
          "binding": "DB",
          "database_name": "podoadmin-prod",
          "database_id": "PENDIENTE-DATABASE-ID",
          "migrations_dir": "src/api/migrations"
        }
      ],
      "r2_buckets": [
        {
          "bucket_name": "podoadmin-prod",
          "binding": "BUCKET"
        }
      ],
      "kv_namespaces": [
        {
          "binding": "RATE_LIMIT_KV",
          "id": "PENDIENTE-KV-NAMESPACE-ID"
        }
      ],
      "queues": {
        "producers": [
          {
            "binding": "NOTIFICATIONS_QUEUE",
            "queue": "podoadmin-notifications-prod"
          }
        ],
        "consumers": [
          {
            "queue": "podoadmin-notifications-prod",
            "max_batch_size": 10,
            "max_batch_timeout": 5,
            "max_retries": 3
          }
        ]
      }
    }
  }
}
