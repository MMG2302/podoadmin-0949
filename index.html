<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
		<!-- iOS "añadir a pantalla de inicio": requiere PNG (SVG no soportado). 180×180 para iPhone. -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
		<link rel="icon" sizes="any" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
		<meta name="theme-color" content="#f9fafb" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://js.hcaptcha.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:* https://localhost:* ws://localhost:* wss://localhost:* https://challenges.cloudflare.com https://hcaptcha.com https://*.hcaptcha.com https://www.google.com; frame-src https://challenges.cloudflare.com https://hcaptcha.com https://*.hcaptcha.com https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<meta http-equiv="X-Frame-Options" content="DENY" />
		<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
		<meta name="referrer" content="strict-origin-when-cross-origin" />
		<title>PodoAdmin</title>
		<script>
			(function () {
				try {
					var raw = localStorage.getItem("podoadmin_theme");
					if (raw) {
						var s = JSON.parse(raw);
						if (s && s.mode === "dark") document.documentElement.classList.add("dark");
					}
					var pRaw = localStorage.getItem("podoadmin_palette");
					if (pRaw) {
						var p = JSON.parse(pRaw);
						var light = p.light || {};
						var dark = p.dark || {};
						function fg(hex) {
							if (!hex || hex.length < 7) return "#ffffff";
							var r = parseInt(hex.slice(1, 3), 16) / 255;
							var g = parseInt(hex.slice(3, 5), 16) / 255;
							var b = parseInt(hex.slice(5, 7), 16) / 255;
							var rs = r <= 0.03928 ? r / 12.92 : Math.pow((r + 0.055) / 1.055, 2.4);
							var gs = g <= 0.03928 ? g / 12.92 : Math.pow((g + 0.055) / 1.055, 2.4);
							var bs = b <= 0.03928 ? b / 12.92 : Math.pow((b + 0.055) / 1.055, 2.4);
							return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs > 0.45 ? "#1a1a1a" : "#ffffff";
						}
						function vars(m) {
							var s = m.sidebar || "#1a1a1a";
							var pr = m.primary || "#1a1a1a";
							var surf = m.surface || "#ffffff";
							return "--brand-sidebar:" + s + ";--brand-sidebar-fg:" + fg(s) +
								";--brand-sidebar-active-bg:" + surf + ";--brand-sidebar-active-fg:" + fg(surf) +
								";--brand-ink:" + pr + ";--brand-ink-fg:" + fg(pr) +
								";--brand-ink-hover:" + (m.primaryHover || "#2a2a2a") +
								";--brand-canvas:" + (m.canvas || "#f9fafb") +
								";--brand-surface:" + surf +
								";--brand-muted:" + (m.muted || "#6b7280") +
								";--brand-border:" + (m.border || "#e5e7eb") +
								";--semantic-error:" + (m.error || "#dc2626") +
								";--semantic-error-bg:" + (m.errorBg || "#fef2f2") +
								";--semantic-warning:" + (m.warning || "#92400e") +
								";--semantic-warning-bg:" + (m.warningBg || "#fffbeb") +
								";--semantic-success:" + (m.success || "#16a34a") +
								";--semantic-success-bg:" + (m.successBg || "#f0fdf4") +
								";--semantic-info:" + (m.info || "#2563eb") +
								";--semantic-info-bg:" + (m.infoBg || "#eff6ff");
						}
						var st = document.createElement("style");
						st.id = "podoadmin-palette";
						st.textContent = ":root{" + vars(light) + "}.dark{" + vars(dark) + "}";
						document.head.appendChild(st);
					}
				} catch (e) {}
			})();
		</script>
	</head>

	<body>
		<div id="root"></div>
		<script type="module" src="/src/web/main.tsx"></script>
	</body>
</html>
